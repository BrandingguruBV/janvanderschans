name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/test?schema=public
      NEXTAUTH_SECRET: ci-build-secret-must-be-at-least-32-chars
      NEXTAUTH_URL: http://localhost:3000
      STRIPE_SECRET_KEY: sk_test_ci_placeholder_for_build_only
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder_for_build_only

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Prisma migrate
        run: npx prisma migrate deploy

      - name: Producten uit public/products synchroniseren
        run: npx tsx scripts/sync-products-from-fs.ts

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
